<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<link
			rel="stylesheet"
			href="sudokuGame.css" />
	</head>

	<body>
		<div id="app"></div>
		<script>
			// model
			const boards = [
				"12 34           ", // delvis utfylt, ingen feil
				"12  34          ", // delvis utfylt, ingen feil
				"121 34          ", // delvis utfylt, samme tall to ganger på en rad
				"12  34  1       ", // delvis utfylt, samme tall to ganger på en kolonne
				"12  34    2    2", // delvis utfylt, samme tall to ganger i en firkant
				"12  56    2    2", // delvis utfylt, ugyldig tall
				"1234341221434321", // helt utfylt, ingen feil
				"1434321221434321", // helt utfylt, samme tall to ganger på en rad
				"1432341221434321", // helt utfylt, samme tall to ganger på en kolonne
			];
			let selectedBoardIndex = 0;
			let selectedNumber = 1;

			// view
			updateView();
			function updateView() {
				document.getElementById("app").innerHTML = /*HTML*/ `
                <div class="board">
                    ${createSquares()}
                </div>
				${createNumberButtons()}
                <select onchange="selectBoard(this.value)">
                    ${createOptions()}
                </select>
            `;
			}

			function createOptions() {
				let html = "";
				for (let index = 0; index < boards.length; index++) {
					const board = boards[index];
					html += /*HTML*/ `<option value="${index}">${board}</option>`;
				}
				return html;
			}

			function createSquares() {
				const board = boards[selectedBoardIndex];
				let html = "";
				for (let square of board) {
					html += /*HTML*/ `<div>${square}</div>`;
				}
				return html;
			}

			function createNumberButtons() {
				return /* html */ `
					<div class="number-btns">
						<button onclick="selectedNumber=1" data-selected="${selectedNumber == 1}">1</button>
						<button onclick="selectedNumber=2" data-selected="${selectedNumber == 2}">2</button>
						<button onclick="selectedNumber=3" data-selected="${selectedNumber == 3}">3</button>
						<button onclick="selectedNumber=4" data-selected="${selectedNumber == 4}">4</button>
					</div>
				`;
			}

			// controller
			function selectBoard(index) {
				selectedBoardIndex = index;
				updateView();
				console.log(validateSudokuBoard(boards[selectedBoardIndex]));
			}

			function selectNumber(num) {
				selectedNumber = num;
				updateView();
			}
		</script>
		<script src="validateSudokoboard.js"></script>
	</body>
</html>
